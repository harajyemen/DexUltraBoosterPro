name: Build AAB (Google Play Bundle)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build-aab:
    name: Build Release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore from Base64 Secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > keystore/release.jks
            echo "Keystore decoded successfully"
          else
            echo "WARNING: No keystore provided, using debug signing"
            keytool -genkey -v -keystore keystore/release.jks \
              -alias androiddebugkey -keyalg RSA -keysize 2048 \
              -validity 10000 -storepass android -keypass android \
              -dname "CN=DexUltra, OU=Dev, O=DexUltra, L=Unknown, S=Unknown, C=US"
          fi

      - name: Build Release Bundle (AAB)
        env:
          KEYSTORE_PATH: keystore/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'androiddebugkey' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DexUltra-Release-AAB
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Generate build info
        run: |
          echo "Build completed at: $(date)" > build_info.txt
          echo "Version: ${{ github.ref_name || inputs.version_name }}" >> build_info.txt
          echo "Commit: ${{ github.sha }}" >> build_info.txt
          cat build_info.txt

      - name: Create Release with AAB
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/bundle/release/app-release.aab
          name: "DexUltra Booster Pro ${{ github.ref_name }} (AAB)"
          body: |
            ## DexUltra Booster Pro ${{ github.ref_name }}
            
            **AAB** — للنشر على Google Play Store.
            
            ### الميزات
            - حقن ملفات 120 FPS (UserCustom.ini + Active.sav)
            - تكامل Shizuku للأذونات المتقدمة
            - ماشر عائم (Crosshair) قابل للسحب
            - إعدادات الحساسية (مع/بدون جيرو)
            - محسّن البنق + DNS مخصص
            - نصائح الاحتراف
            
            ### جميع إصدارات ببجي مدعومة
            - PUBG Mobile Global
            - PUBG Mobile KR
            - PUBG Mobile VN
            - BGMI
            - PUBG Mobile Lite
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
