name: Build APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DexUltra-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  build-release-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"

      - name: Setup Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > keystore/auto-generated.jks
            echo "KEYSTORE_PATH=keystore/auto-generated.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "✅ Using provided release keystore"
          else
            keytool -genkey -v -keystore keystore/auto-generated.jks \
              -alias androiddebugkey -keyalg RSA -keysize 2048 \
              -validity 10000 -storepass android -keypass android \
              -dname "CN=DexUltra, OU=Dev, O=DexUltra, L=SA, S=SA, C=SA"
            echo "KEYSTORE_PATH=keystore/auto-generated.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
            echo "KEY_ALIAS=androiddebugkey" >> $GITHUB_ENV
            echo "KEY_PASSWORD=android" >> $GITHUB_ENV
            echo "⚠️ Auto-generated debug keystore used"
          fi

      - name: Build Release APK
        run: gradle assembleRelease --stacktrace --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: DexUltra-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          name: "DexUltra Booster Pro ${{ github.ref_name }}"
          body: |
            ## DexUltra Booster Pro ${{ github.ref_name }}

            ### الميزات
            - حقن ملفات 120 FPS (UserCustom.ini + Active.sav)
            - تكامل Shizuku للوصول لملفات /data/data/
            - شاشة عائمة (Crosshair) قابلة للسحب
            - إعدادات الحساسية (8 إعدادات مسبقة مع/بدون جيرو)
            - محسّن البنق + DNS مخصص
            - 15+ نصيحة احترافية

            ### إصدارات ببجي المدعومة
            - PUBG Mobile Global / KR / VN
            - BGMI
            - PUBG Mobile Lite
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
